  <meta name="twitter:card" content="summary_large_image">

<body>
  <div data-include="/components/header.html"></div>
  <nav class="breadcrumb" aria-label="Breadcrumb"><div class="container"><ol><li><a href="/">Home</a></li><li>Search</li></ol></div></nav>
  <main>
    <section class="page-hero">
      <div class="container">
        <span class="section-num">Site search</span>
        <h1>Search Syntony Research.</h1>
        <p class="hero-sub">Find services, research reports, software pages, products, and company information.</p>

    <section class="search-section">
      <div class="container">
        <form class="search-form" role="search" data-search-form>
          <label class="sr-only" for="site-search-input">Search the site</label>
          <input id="site-search-input" name="q" type="search" autocomplete="off" placeholder="Search governance, red teaming, Conductor, reports..." data-search-input>
          <button class="btn-dark" type="submit">Search <span class="btn-arrow">→</span></button>
        </form>
        <div class="search-meta" data-search-meta>Type a query to search the site.</div>
        <div class="search-results" data-search-results></div>
      </div>
    </section>
  </main>
  <div data-include="/components/footer.html"></div>
  <script src="/assets/js/site.js" defer></script>
  <script src="/assets/js/search.js" defer></script>
