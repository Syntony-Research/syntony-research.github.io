<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-Domain AI Risk Causal Loop Diagram</title>
<style>
:root{
  --color-background-primary:#07111D;
  --color-background-secondary:#102038;
  --color-border-secondary:rgba(244,238,226,.18);
  --color-text-primary:#F4EEE2;
  --color-text-secondary:#B3BECE;
  --color-text-tertiary:#8E9BB0;
  --font-sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#07111D;color:var(--color-text-primary);font-family:var(--font-sans);overflow:hidden}
body{padding:16px}
.cld-shell{border:1px solid rgba(244,238,226,.12);border-radius:16px;background:radial-gradient(circle at 78% 12%,rgba(208,174,85,.12),transparent 28%),linear-gradient(180deg,rgba(16,32,56,.96),rgba(7,17,29,.98));padding:18px;min-height:100%}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
svg{display:block;width:100%;height:auto}
svg text{fill:var(--color-text-primary)}
svg .th{font-family:var(--font-sans);font-size:13px;font-weight:500;fill:var(--color-text-primary)}
svg .ts{font-family:var(--font-sans);font-size:12px;fill:var(--color-text-tertiary)}
</style>
</head>
<body>
<div class="cld-shell">
<h2 class="sr-only">Interactive causal loop diagram showing cross-domain AI risk, safety, and governance dynamics with four labeled feedback loops</h2>
<style>
.loop-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .25s;user-select:none;background:var(--color-background-secondary)}
.loop-pill:hover{transform:translateY(-1px)}
.loop-pill.active{border-color:currentColor}
.loop-pill .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.loop-pill .tag{font-weight:500;opacity:.7;font-size:11px;letter-spacing:.03em}
svg .edge{transition:opacity .35s,stroke-opacity .35s}
svg .node-g{transition:opacity .35s}
svg .polarity{font-family:var(--font-sans);font-size:13px;font-weight:500;transition:opacity .35s}
svg .loop-label{font-family:var(--font-sans);transition:opacity .35s}
.faded{opacity:.1!important}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
.sub{font-size:12px;color:var(--color-text-tertiary);margin:0 0 16px;line-height:1.5}
</style>

<p class="sub" style="margin-top:4px">Click a loop to isolate it. Cross-domain links shown in gray.</p>
<div class="legend-row">
  <div class="loop-pill active" data-loop="all" onclick="setLoop('all')"><span class="dot" style="background:var(--color-text-secondary)"></span>All loops</div>
  <div class="loop-pill" data-loop="R1" onclick="setLoop('R1')" style="color:#7F77DD"><span class="dot" style="background:#7F77DD"></span><span class="tag">R1</span> Capability arms race</div>
  <div class="loop-pill" data-loop="B1" onclick="setLoop('B1')" style="color:#D85A30"><span class="dot" style="background:#D85A30"></span><span class="tag">B1</span> Regulatory correction</div>
  <div class="loop-pill" data-loop="R2" onclick="setLoop('R2')" style="color:#1D9E75"><span class="dot" style="background:#1D9E75"></span><span class="tag">R2</span> Evaluation flywheel</div>
  <div class="loop-pill" data-loop="B2" onclick="setLoop('B2')" style="color:#378ADD"><span class="dot" style="background:#378ADD"></span><span class="tag">B2</span> Incident response</div>
</div>

<svg width="100%" viewBox="0 0 680 530" role="img">
<title>Cross-domain AI risk causal loop diagram</title>
<desc>Eight variables connected by causal arrows forming four feedback loops: two reinforcing (R1 arms race, R2 evaluation flywheel) and two balancing (B1 regulatory correction, B2 incident response), plus cross-domain links.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- === EDGES (behind nodes) === -->

<!-- R1: Competition → Capability (+ ) -->
<path class="edge" data-loops="R1" d="M421,87 C395,72 370,55 364,50" fill="none" stroke="#7F77DD" stroke-width="1.8" marker-end="url(#arr-purple)"/>
<circle class="polarity" data-loops="R1" cx="388" cy="64" r="9" fill="var(--color-background-primary)" stroke="#7F77DD" stroke-width="0.8"/>
<text class="polarity" data-loops="R1" x="388" y="68" text-anchor="middle" fill="#7F77DD">+</text>

<!-- R1: Capability → Deployment (+ ) -->
<path class="edge" data-loops="R1" d="M290,71 C290,150 565,150 565,210" fill="none" stroke="#7F77DD" stroke-width="1.8" marker-end="url(#arr-purple)"/>
<circle class="polarity" data-loops="R1" cx="428" cy="130" r="9" fill="var(--color-background-primary)" stroke="#7F77DD" stroke-width="0.8"/>
<text class="polarity" data-loops="R1" x="428" y="134" text-anchor="middle" fill="#7F77DD">+</text>

<!-- R1: Deployment → Competition (+ ) -->
<path class="edge" data-loops="R1" d="M580,210 C610,160 545,115 525,108" fill="none" stroke="#7F77DD" stroke-width="1.8" marker-end="url(#arr-purple)"/>
<circle class="polarity" data-loops="R1" cx="578" cy="148" r="9" fill="var(--color-background-primary)" stroke="#7F77DD" stroke-width="0.8"/>
<text class="polarity" data-loops="R1" x="578" y="152" text-anchor="middle" fill="#7F77DD">+</text>

<!-- R1 loop label -->
<g class="loop-label" data-loops="R1">
<circle cx="510" cy="168" r="16" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text x="510" y="172" text-anchor="middle" fill="#534AB7" style="font-size:11px;font-weight:500">R1</text>
</g>

<!-- B1: Deployment → Incidents (+ ) -->
<path class="edge" data-loops="B1" d="M565,256 C565,310 490,340 480,360" fill="none" stroke="#D85A30" stroke-width="1.8" marker-end="url(#arr-coral)"/>
<circle class="polarity" data-loops="B1" cx="535" cy="302" r="9" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="0.8"/>
<text class="polarity" data-loops="B1" x="535" y="306" text-anchor="middle" fill="#D85A30">+</text>

<!-- B1: Incidents → Reg Pressure (+ ) -->
<path class="edge" data-loops="B1" d="M404,390 C330,400 260,400 212,385" fill="none" stroke="#D85A30" stroke-width="1.8" marker-end="url(#arr-coral)"/>
<circle class="polarity" data-loops="B1" cx="310" cy="400" r="9" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="0.8"/>
<text class="polarity" data-loops="B1" x="310" y="404" text-anchor="middle" fill="#D85A30">+</text>

<!-- B1: Reg Pressure → Deployment (− ) -->
<path class="edge" data-loops="B1" d="M160,364 C240,290 440,265 483,238" fill="none" stroke="#D85A30" stroke-width="1.8" marker-end="url(#arr-coral)" stroke-dasharray="6 3"/>
<circle class="polarity" data-loops="B1" cx="330" cy="290" r="9" fill="var(--color-background-primary)" stroke="#D85A30" stroke-width="0.8"/>
<text class="polarity" data-loops="B1" x="330" y="294" text-anchor="middle" fill="#D85A30">−</text>

<!-- B1 loop label -->
<g class="loop-label" data-loops="B1">
<circle cx="450" cy="320" r="16" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text x="450" y="324" text-anchor="middle" fill="#993C1D" style="font-size:11px;font-weight:500">B1</text>
</g>

<!-- R2: Safety Inv → Eval Rigor (+ ) -->
<path class="edge" data-loops="R2,B2" d="M95,210 C95,170 150,145 160,136" fill="none" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arr-teal)"/>
<circle class="polarity" data-loops="R2,B2" cx="115" cy="168" r="9" fill="var(--color-background-primary)" stroke="#1D9E75" stroke-width="0.8"/>
<text class="polarity" data-loops="R2,B2" x="115" y="172" text-anchor="middle" fill="#1D9E75">+</text>

<!-- R2: Eval Rigor → Public Trust (+ ) -->
<path class="edge" data-loops="R2" d="M185,136 C185,250 290,380 290,449" fill="none" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arr-teal)"/>
<circle class="polarity" data-loops="R2" cx="220" cy="310" r="9" fill="var(--color-background-primary)" stroke="#1D9E75" stroke-width="0.8"/>
<text class="polarity" data-loops="R2" x="220" y="314" text-anchor="middle" fill="#1D9E75">+</text>

<!-- R2: Public Trust → Safety Inv (+ ) -->
<path class="edge" data-loops="R2" d="M224,470 C160,470 80,400 85,260" fill="none" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arr-teal)"/>
<circle class="polarity" data-loops="R2" cx="130" cy="420" r="9" fill="var(--color-background-primary)" stroke="#1D9E75" stroke-width="0.8"/>
<text class="polarity" data-loops="R2" x="130" y="424" text-anchor="middle" fill="#1D9E75">+</text>

<!-- R2 loop label -->
<g class="loop-label" data-loops="R2">
<circle cx="155" cy="350" r="16" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text x="155" y="354" text-anchor="middle" fill="#0F6E56" style="font-size:11px;font-weight:500">R2</text>
</g>

<!-- B2: Incidents → Safety Inv (+ ) -->
<path class="edge" data-loops="B2" d="M404,395 C310,420 180,350 140,260" fill="none" stroke="#378ADD" stroke-width="1.8" marker-end="url(#arr-blue)"/>
<circle class="polarity" data-loops="B2" cx="280" cy="380" r="9" fill="var(--color-background-primary)" stroke="#378ADD" stroke-width="0.8"/>
<text class="polarity" data-loops="B2" x="280" y="384" text-anchor="middle" fill="#378ADD">+</text>

<!-- B2: Eval Rigor → Incidents (− ) -->
<path class="edge" data-loops="B2" d="M265,120 C350,130 430,200 455,360" fill="none" stroke="#378ADD" stroke-width="1.8" marker-end="url(#arr-blue)" stroke-dasharray="6 3"/>
<circle class="polarity" data-loops="B2" cx="380" cy="230" r="9" fill="var(--color-background-primary)" stroke="#378ADD" stroke-width="0.8"/>
<text class="polarity" data-loops="B2" x="380" y="234" text-anchor="middle" fill="#378ADD">−</text>

<!-- B2 loop label -->
<g class="loop-label" data-loops="B2">
<circle cx="310" cy="330" r="16" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text x="310" y="334" text-anchor="middle" fill="#185FA5" style="font-size:11px;font-weight:500">B2</text>
</g>

<!-- Cross-links (gray) -->
<!-- Reg Pressure → Safety Inv (+ ) -->
<path class="edge" data-loops="cross" d="M100,364 C90,330 90,290 92,260" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr-gray)" opacity="0.6"/>
<circle class="polarity" data-loops="cross" cx="90" cy="310" r="8" fill="var(--color-background-primary)" stroke="#888780" stroke-width="0.6" opacity="0.6"/>
<text class="polarity" data-loops="cross" x="90" y="314" text-anchor="middle" fill="#888780" style="font-size:12px">+</text>

<!-- Public Trust → Deployment (+ ) -->
<path class="edge" data-loops="cross" d="M356,462 C430,440 530,380 558,260" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr-gray)" opacity="0.6"/>
<circle class="polarity" data-loops="cross" cx="480" cy="380" r="8" fill="var(--color-background-primary)" stroke="#888780" stroke-width="0.6" opacity="0.6"/>
<text class="polarity" data-loops="cross" x="480" y="384" text-anchor="middle" fill="#888780" style="font-size:12px">+</text>

<!-- AI Capability → Incidents (+ ) -->
<path class="edge" data-loops="cross" d="M320,71 C360,120 430,250 460,360" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arr-gray)" opacity="0.6"/>
<circle class="polarity" data-loops="cross" cx="400" cy="220" r="8" fill="var(--color-background-primary)" stroke="#888780" stroke-width="0.6" opacity="0.6"/>
<text class="polarity" data-loops="cross" x="400" y="224" text-anchor="middle" fill="#888780" style="font-size:12px">+</text>

<!-- === NODES (on top) === -->

<!-- 1. AI capability -->
<g class="node-g" data-nodes="1">
<rect x="216" y="29" width="148" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="290" y="50" text-anchor="middle" dominant-baseline="central">AI capability</text>
</g>

<!-- 2. Market competition -->
<g class="node-g" data-nodes="2">
<rect x="421" y="66" width="178" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="510" y="87" text-anchor="middle" dominant-baseline="central">Market competition</text>
</g>

<!-- 3. Deployment speed -->
<g class="node-g" data-nodes="3">
<rect x="483" y="210" width="164" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="565" y="231" text-anchor="middle" dominant-baseline="central">Deployment speed</text>
</g>

<!-- 4. AI incidents -->
<g class="node-g" data-nodes="4">
<rect x="404" y="364" width="142" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="475" y="385" text-anchor="middle" dominant-baseline="central">AI incidents</text>
</g>

<!-- 5. Public trust -->
<g class="node-g" data-nodes="5">
<rect x="224" y="449" width="132" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="290" y="470" text-anchor="middle" dominant-baseline="central">Public trust</text>
</g>

<!-- 6. Regulatory pressure -->
<g class="node-g" data-nodes="6">
<rect x="28" y="364" width="184" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="120" y="385" text-anchor="middle" dominant-baseline="central">Regulatory pressure</text>
</g>

<!-- 7. Safety investment -->
<g class="node-g" data-nodes="7">
<rect x="10" y="214" width="170" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="95" y="235" text-anchor="middle" dominant-baseline="central">Safety investment</text>
</g>

<!-- 8. Evaluation rigor -->
<g class="node-g" data-nodes="8">
<rect x="105" y="94" width="160" height="42" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
<text class="th" x="185" y="115" text-anchor="middle" dominant-baseline="central">Evaluation rigor</text>
</g>

<!-- Dashed line convention note -->
<g>
<line x1="30" y1="510" x2="55" y2="510" stroke="var(--color-text-tertiary)" stroke-width="1.2" stroke-dasharray="5 3"/>
<text class="ts" x="62" y="514" fill="var(--color-text-tertiary)">Negative polarity (−)</text>
<line x1="220" y1="510" x2="245" y2="510" stroke="var(--color-text-tertiary)" stroke-width="1.2"/>
<text class="ts" x="252" y="514" fill="var(--color-text-tertiary)">Positive polarity (+)</text>
<text class="ts" x="430" y="514" fill="var(--color-text-tertiary)">Gray = cross-domain coupling</text>
</g>
</svg>

<script>
const loopNodes = {
  R1: ['1','2','3'],
  B1: ['3','4','6'],
  R2: ['5','7','8'],
  B2: ['4','7','8']
};

function setLoop(id) {
  document.querySelectorAll('.loop-pill').forEach(p => p.classList.toggle('active', p.dataset.loop === id));
  const edges = document.querySelectorAll('.edge, .polarity, .loop-label');
  const nodes = document.querySelectorAll('.node-g');
  if (id === 'all') {
    edges.forEach(e => e.classList.remove('faded'));
    nodes.forEach(n => n.classList.remove('faded'));
    return;
  }
  const activeNodes = new Set(loopNodes[id] || []);
  edges.forEach(e => {
    const loops = (e.dataset.loops || '').split(',');
    e.classList.toggle('faded', !loops.includes(id));
  });
  nodes.forEach(n => {
    const nids = (n.dataset.nodes || '').split(',');
    const isActive = nids.some(nid => activeNodes.has(nid));
    n.classList.toggle('faded', !isActive);
  });
}
</script>
</div>
</body>
</html>
